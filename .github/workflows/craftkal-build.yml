# Build CraftkalOS ISO (CachyOS base + craftkal branding)
# Clones upstream CachyOS, patches branding, builds via buildiso.sh
# Trigger: Manual (workflow_dispatch)

name: Build CraftkalOS ISO

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
      options: --privileged

    steps:
      - name: Install git
        run: pacman -Syu --noconfirm git

      - name: Initialize pacman keyring
        run: |
          pacman-key --init
          pacman-key --populate archlinux

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            archiso mkinitcpio-archiso squashfs-tools grub syslinux sudo git
          printf '%s\n' '' '[cachyos]' \
            'Server = https://mirror.cachyos.org/repo/$arch/$repo' \
            'SigLevel = Optional TrustAll' >> /etc/pacman.conf
          pacman -Syu --noconfirm cachyos-keyring

      - name: Clone upstream and apply branding
        id: upstream
        run: |
          git clone https://github.com/CachyOS/CachyOS-Live-ISO.git /tmp/upstream
          cd /tmp/upstream
          git checkout 33bbc02
          sed -i 's|^iso_name=".*"|iso_name="craftkalos"|' archiso/profiledef.sh
          sed -i 's|^iso_publisher=".*"|iso_publisher="craftkal"|' archiso/profiledef.sh
          sed -i 's|^iso_application=".*"|iso_application="CraftkalOS Live/Rescue DVD"|' archiso/profiledef.sh
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Pre-populate CachyOS keyring in airootfs
        run: |
          mkdir -p /tmp/upstream/archiso/airootfs/etc/pacman.d/gnupg
          cp -a --no-preserve=ownership /etc/pacman.d/gnupg/. \
            /tmp/upstream/archiso/airootfs/etc/pacman.d/gnupg/

      - name: Build ISO
        id: build
        working-directory: /tmp/upstream
        run: |
          export USER="${USER:-root}"
          bash buildiso.sh -p desktop -v

      - name: Collect ISO
        run: |
          ISO_FILE=$(ls /tmp/upstream/out/desktop/*.iso 2>/dev/null | head -1)
          echo "ISO_FILE=$ISO_FILE" >> "$GITHUB_ENV"
          echo "ISO_NAME=$(basename "$ISO_FILE")" >> "$GITHUB_ENV"
          echo "ISO_SIZE=$(du -h "$ISO_FILE" | cut -f1)" >> "$GITHUB_ENV"
          echo "ISO_SHA256=$(sha256sum "$ISO_FILE" | cut -d' ' -f1)" >> "$GITHUB_ENV"

      - name: Upload ISO
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: craftkalos-iso-${{ steps.upstream.outputs.commit }}
          path: ${{ env.ISO_FILE }}
          if-no-files-found: error
